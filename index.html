<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROFIL YANZZSTORE15 - PROFIL PRIBADI </title>
    <!-- Menggunakan Font Poppins agar terlihat modern -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome untuk Icon Sosmed -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            /* Background gradasi dinamis Merah & Biru Gelap */
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #450a0a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: #ffffff;
        }

        .container {
            width: 100%;
            max-width: 450px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        /* Foto Profil dengan Efek Glowing Merah-Biru */
        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid transparent;
            background-image: linear-gradient(#1e1b4b, #1e1b4b), linear-gradient(to right, #ef4444, #3b82f6);
            background-origin: border-box;
            background-clip: content-box, border-box;
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.5);
            margin-bottom: 20px;
            transition: transform 0.3s ease;
        }

        .profile-img:hover {
            transform: scale(1.05);
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        .username {
            font-size: 0.9rem;
            color: #94a3b8;
            margin-bottom: 25px;
        }

        /* Wrapper untuk tombol-tombol link */
        .links-wrapper {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* Style Umum Tombol */
        .btn-link {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 16px;
            text-decoration: none;
            color: white;
            font-weight: 600;
            border-radius: 12px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .btn-link i {
            font-size: 1.3rem;
        }

        /* Tombol Instagram - Dominan Merah/Pinky Red */
        .instagram {
            background: linear-gradient(135deg, #dc2626 0%, #e11d48 100%);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .instagram:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(220, 38, 38, 0.5);
        }

        /* Tombol WhatsApp - Dominan Biru */
        .whatsapp {
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .whatsapp:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(37, 99, 235, 0.5);
        }

        /* Footer Kecil ala Lynk */
        .footer {
            margin-top: 35px;
            font-size: 0.75rem;
            color: #64748b;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Foto Profil Anda -->
        <img src="https://www.image2url.com/r2/default/images/1779540398057-7924d4dc-8b05-4100-be9c-7dbd5e22be7b.png" alt="Foto Profil" class="profile-img">
        
        <!-- Nama & Username -->
        <h1>Welcome to My Profile</h1>
        <div class="username">@clvuuuyfizz_</div>
        
        <!-- Tombol Tautan -->
        <div class="links-wrapper">
            <!-- Instagram -->
            <a href="https://www.instagram.com/clvuuuyfizz_?igsh=MWNzb2RtNHE4dm9zNQ==" target="_blank" class="btn-link instagram">
                <i class="fab fa-instagram"></i> Instagram
            </a>
            
            <!-- WhatsApp -->
            <a href="https://wa.me/6289502187092" target="_blank" class="btn-link whatsapp">
                <i class="fab fa-whatsapp"></i> WhatsApp Me
            </a>
        </div>

        <div class="footer">
            Keren &bull; Dibuat dengan HTML & CSS
        </div>
    </div>

</body>
</html>
